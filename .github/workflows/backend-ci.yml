name: backend-ci

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

defaults:
  run:
    working-directory: backend

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: doble9s
          POSTGRES_PASSWORD: doble9s
          POSTGRES_DB: doble9s
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U doble9s" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://doble9s:doble9s@localhost:5432/doble9s
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install deps (frozen)
        run: make sync
      - name: Apply migrations
        run: make migrate
      - name: Lint + typecheck + tests
        run: make check
