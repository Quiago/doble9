# Alembic config — Architect-owned scaffold. Backend wires target_metadata
# in migrations/env.py once SQLAlchemy models exist. Run via `make migrate`
# / `make makemigration m="..."` (never raw alembic).
[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# DB URL is injected from the DATABASE_URL env var in migrations/env.py.
# Do NOT hardcode credentials here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
